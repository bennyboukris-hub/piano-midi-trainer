<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מפתח פה - Landscape MIDI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #1a1a1a; 
            margin: 0; 
            color: white; 
            overflow: hidden; /* מונע גלילה מיותרת במסך שוכב */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* הגדרות למצב שוכב */
        .game-area {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            flex: 1;
            padding: 10px;
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            min-width: 150px;
        }

        .staff-container {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        #staff-output {
            width: 300px;
            height: 150px;
        }

        #timer-display { 
            font-size: 3rem; 
            font-weight: bold; 
            color: #ff4757; 
        }

        /* פסנתר בתחתית המסך */
        .piano-wrapper { 
            position: relative; 
            width: 100%; 
            height: 140px; 
            background: #222; 
            user-select: none; 
            border-top: 4px solid #444;
        }
        
        .white-key { 
            position: absolute; 
            width: 7.69%; /* 100 / 13 קלידים */
            height: 100%; 
            background: white; 
            border: 1px solid #000; 
            border-radius: 0 0 5px 5px; 
            z-index: 1; 
            box-sizing: border-box;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: #999;
            font-size: 12px;
            padding-bottom: 5px;
        }
        
        .black-key { 
            position: absolute; 
            width: 5%; 
            height: 60%; 
            background: black; 
            border-radius: 0 0 3px 3px; 
            z-index: 2; 
            border: 1px solid #444; 
            box-sizing: border-box; 
        }

        .correct { background: #2ecc71 !important; }
        .wrong { background: #e74c3c !important; }
        
        #midi-status { 
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 10px;
            color: #2ecc71;
        }

        .toggle-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="midi-status">MIDI מחפש...</div>

    <div class="game-area">
        <div class="stats-panel">
            <div id="score-display">ניקוד: <span id="score">0</span></div>
            <div id="high-score-display">שיא: <span id="high-score">0</span></div>
            <div id="timer-display">5</div>
            <button id="mode-btn" class="toggle-btn" onclick="toggleTimer()">מצב אימון</button>
        </div>

        <div class="staff-container">
            <div id="staff-output"></div>
        </div>
    </div>

    <div id="msg" style="text-align: center; font-weight: bold; padding: 5px;"></div>

    <div class="piano-wrapper" id="piano"></div>

<script>
const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;
let score = 0, highScore = localStorage.getItem('pianoHighScore') || 0;
let currentNoteKey = "", canClick = true, countdownInterval, timeLeft = 5, isTimerEnabled = true;

document.getElementById('high-score').innerText = highScore;

const midiMap = {
    41: "F/2", 42: "F#/2", 43: "G/2", 44: "G#/2", 45: "A/2", 46: "A#/2", 47: "B/2",
    48: "C/3", 49: "C#/3", 50: "D/3", 51: "D#/3", 52: "E/3", 53: "F/3"
};

const allNotes = [
    { name: "F", oct: 2, type: "white", left: 0 },
    { name: "F#", oct: 2, type: "black", left: 5.5 },
    { name: "G", oct: 2, type: "white", left: 7.69 },
    { name: "G#", oct: 2, type: "black", left: 13 },
    { name: "A", oct: 2, type: "white", left: 15.38 },
    { name: "A#", oct: 2, type: "black", left: 21 },
    { name: "B", oct: 2, type: "white", left: 23.07 },
    { name: "C", oct: 3, type: "white", left: 30.76 },
    { name: "C#", oct: 3, type: "black", left: 36.5 },
    { name: "D", oct: 3, type: "white", left: 38.45 },
    { name: "D#", oct: 3, type: "black", left: 44 },
    { name: "E", oct: 3, type: "white", left: 46.14 },
    { name: "F", oct: 3, type: "white", left: 53.83 }
];

function createPiano() {
    const piano = document.getElementById('piano');
    allNotes.forEach(k => {
        const div = document.createElement('div');
        div.className = k.type === "white" ? 'white-key' : 'black-key';
        div.style.left = k.left + '%';
        div.id = `key-${k.name.replace('#', 's')}-${k.oct}`;
        if(k.type === "white") div.innerText = k.name;
        div.onclick = () => handleInput(`${k.name}/${k.oct}`, div);
        piano.appendChild(div);
    });
}

function drawNote() {
    canClick = true;
    const div = document.getElementById("staff-output");
    div.innerHTML = "";
    
    const renderer = new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(300, 150);
    const context = renderer.getContext();
    context.setFillStyle("black");
    context.setStrokeStyle("black");

    const stave = new Stave(10, 20, 280);
    stave.addClef("bass").setContext(context).draw();

    const randomNote = allNotes[Math.floor(Math.random() * allNotes.length)];
    currentNoteKey = `${randomNote.name}/${randomNote.oct}`;
    
    const note = new StaveNote({ clef: "bass", keys: [currentNoteKey], duration: "q" });
    if (randomNote.name.includes("#")) note.addModifier(new Accidental("#"));
    
    const voice = new Voice({ num_beats: 1, beat_value: 4 });
    voice.addTickables([note]);
    new Formatter().joinVoices([voice]).format([voice], 150);
    voice.draw(context, stave);
    
    if (isTimerEnabled) startCountdown();
}

function startCountdown() {
    timeLeft = 5;
    document.getElementById('timer-display').innerText = timeLeft;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdownInterval);
            if (canClick) resetGame("זמן!");
        }
    }, 1000);
}

function handleInput(guess, el) {
    if (!canClick || !el) return;
    if (guess === currentNoteKey) {
        canClick = false; clearInterval(countdownInterval);
        el.classList.add('correct');
        score += 10;
        document.getElementById('score').innerText = score;
        if (score > highScore) { 
            highScore = score; localStorage.setItem('pianoHighScore', highScore); 
            document.getElementById('high-score').innerText = highScore; 
        }
        setTimeout(() => { el.classList.remove('correct'); drawNote(); }, 400);
    } else {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 200);
        if (isTimerEnabled) resetGame("טעות!");
    }
}

function resetGame(msg) {
    canClick = false; clearInterval(countdownInterval);
    score = 0; document.getElementById('score').innerText = score;
    document.getElementById('msg').innerText = msg;
    setTimeout(() => { document.getElementById('msg').innerText = ""; drawNote(); }, 1000);
}

function toggleTimer() {
    isTimerEnabled = !isTimerEnabled;
    document.getElementById('timer-display').style.opacity = isTimerEnabled ? "1" : "0.2";
    drawNote();
}

if (navigator.requestMIDIAccess) {
    navigator.requestMIDIAccess().then(access => {
        document.getElementById('midi-status').innerText = "MIDI מחובר";
        access.inputs.forEach(input => {
            input.onmidimessage = (m) => {
                const [cmd, note, vel] = m.data;
                if (cmd === 144 && vel > 0) {
                    const noteName = midiMap[note];
                    if (noteName) {
                        const n = allNotes.find(x => `${x.name}/${x.oct}` === noteName);
                        const el = document.getElementById(`key-${n.name.replace('#', 's')}-${n.oct}`);
                        handleInput(noteName, el);
                    }
                }
            };
        });
    });
}

createPiano();
drawNote();
</script>
</body>
</html>
