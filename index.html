<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIDI Debug Trainer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #0a0a0a; 
            margin: 0; 
            color: white; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: border 0.1s;
            border: 5px solid transparent; /* למשוב ויזואלי */
        }

        #status-container {
            position: absolute;
            top: 15px;
            text-align: center;
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        #midi-status { color: #ff4757; font-weight: bold; }
        #last-midi-note { color: #eccc68; font-family: monospace; font-size: 0.9rem; margin-top: 5px; }

        .staff-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            margin-bottom: 20px;
        }

        #vexflow-canvas { width: 450px; height: 200px; }

        .stats-row {
            display: flex;
            gap: 40px;
            background: rgba(255,255,255,0.05);
            padding: 15px 30px;
            border-radius: 20px;
        }

        .stat-value { font-size: 2.5rem; font-weight: bold; text-align: center; }
        #current-timer { color: #ff4757; }
        #current-score { color: #2ecc71; }

        /* אפקטים של הבהוב */
        .midi-flash { border-color: #eccc68 !important; } /* הבהוב צהוב כשמתקבל סיגנל */
        .success-bg { background: #062006 !important; }
        .error-bg { background: #200606 !important; }
    </style>
</head>
<body id="main-bg">

    <div id="status-container">
        <div id="midi-status">ממתין לחיבור...</div>
        <div id="last-midi-note">לחץ על קליד בפסנתר לבדיקה</div>
    </div>

    <div id="feedback-msg" style="margin-bottom: 15px; font-size: 1.2rem;"></div>

    <div class="staff-box">
        <div id="vexflow-canvas"></div>
    </div>

    <div class="stats-row">
        <div class="stat-item">
            <div style="font-size: 0.7rem; color: #666;">ניקוד</div>
            <div id="current-score" class="stat-value">0</div>
        </div>
        <div class="stat-item">
            <div style="font-size: 0.7rem; color: #666;">זמן</div>
            <div id="current-timer" class="stat-value">5</div>
        </div>
    </div>

<script>
const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

let score = 0;
let activeNote = null;
let secondsLeft = 5;
let gameTimer;
let isPaused = true;

const noteList = [
    { key: "F/2", m: 41, acc: false }, { key: "F#/2", m: 42, acc: true },
    { key: "G/2", m: 43, acc: false }, { key: "G#/2", m: 44, acc: true },
    { key: "A/2", m: 45, acc: false }, { key: "A#/2", m: 46, acc: true },
    { key: "B/2", m: 47, acc: false }, { key: "C/3", m: 48, acc: false },
    { key: "C#/3", m: 49, acc: true }, { key: "D/3", m: 50, acc: false },
    { key: "D#/3", m: 51, acc: true }, { key: "E/3", m: 52, acc: false },
    { key: "F/3", m: 53, acc: false }
];

function renderNewNote() {
    isPaused = false;
    const target = document.getElementById("vexflow-canvas");
    target.innerHTML = "";
    const renderer = new Renderer(target, Renderer.Backends.SVG);
    renderer.resize(450, 200);
    const context = renderer.getContext();
    const stave = new Stave(75, 40, 300);
    stave.addClef("bass").setContext(context).draw();

    activeNote = noteList[Math.floor(Math.random() * noteList.length)];
    const vNote = new StaveNote({ clef: "bass", keys: [activeNote.key], duration: "q" });
    if (activeNote.acc) vNote.addModifier(new Accidental("#"));
    Formatter.FormatAndDraw(context, stave, [vNote]);
    
    startTimer();
}

function startTimer() {
    secondsLeft = 5;
    document.getElementById('current-timer').innerText = secondsLeft;
    clearInterval(gameTimer);
    gameTimer = setInterval(() => {
        secondsLeft--;
        document.getElementById('current-timer').innerText = secondsLeft;
        if (secondsLeft <= 0) finalize(false, "נגמר הזמן!");
    }, 1000);
}

function finalize(correct, txt) {
    if (isPaused) return;
    isPaused = true;
    clearInterval(gameTimer);

    const bg = document.getElementById('main-bg');
    const msg = document.getElementById('feedback-msg');

    if (correct) {
        score += 10;
        msg.innerText = "נכון!";
        msg.style.color = "#2ecc71";
        bg.classList.add('success-bg');
    } else {
        score = 0;
        msg.innerText = txt || "טעות!";
        msg.style.color = "#ff4757";
        bg.classList.add('error-bg');
    }
    document.getElementById('current-score').innerText = score;

    setTimeout(() => {
        bg.classList.remove('success-bg', 'error-bg');
        renderNewNote();
    }, 700);
}

// --- לוגיקת MIDI ודיבאג ---
if (navigator.requestMIDIAccess) {
    navigator.requestMIDIAccess().then(midi => {
        document.getElementById('midi-status').innerText = "פסנתר MIDI מחובר ✅";
        document.getElementById('midi-status').style.color = "#2ecc71";
        
        midi.inputs.forEach(input => {
            input.onmidimessage = (msg) => {
                const [status, note, velocity] = msg.data;
                
                // אינדיקציה לכל לחיצה (אפילו אם לא התו הנכון)
                if (status === 144 && velocity > 0) {
                    // הבהוב צהוב למסגרת
                    document.body.classList.add('midi-flash');
                    setTimeout(() => document.body.classList.remove('midi-flash'), 100);
                    
                    // הצגת מספר התו שנלחץ
                    document.getElementById('last-midi-note').innerText = "נלחץ תו מספר: " + note;

                    // בדיקה אם זה התו הנכון למשחק
                    if (activeNote && note === activeNote.m) {
                        finalize(true);
                    } else {
                        // אם נלחץ תו אבל הוא לא בטווח של המשחק
                        if (!noteList.find(n => n.m === note)) {
                            document.getElementById('feedback-msg').innerText = "תו מחוץ לטווח (F2-F3)";
                            document.getElementById('feedback-msg').style.color = "#eccc68";
                        } else {
                            finalize(false, "תו לא נכון!");
                        }
                    }
                }
            };
        });
    });
} else {
    document.getElementById('midi-status').innerText = "הדפדפן לא תומך ב-MIDI ❌";
}

window.onload = renderNewNote;
</script>
</body>
</html>
