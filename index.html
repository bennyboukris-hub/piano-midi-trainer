<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מפתח פה - אימון MIDI בלבד</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            background: #121212; 
            margin: 0; 
            color: white; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* כותרת סטטוס MIDI */
        #midi-info {
            position: absolute;
            top: 10px;
            font-size: 0.9rem;
            padding: 5px 15px;
            border-radius: 20px;
            background: #222;
            border: 1px solid #444;
        }

        /* אזור התצוגה הראשי */
        .main-display {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        /* החמשה - גדולה וברורה */
        .staff-paper {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            display: inline-block;
            margin-bottom: 20px;
        }

        #staff-output {
            width: 400px;
            height: 200px;
        }

        /* נתוני משחק */
        .game-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 100px;
        }

        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 2.5rem; font-weight: bold; }
        #timer-display { color: #ff4757; }
        #score { color: #2ecc71; }

        #msg {
            height: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* אנימציה להצלחה/טעות */
        .flash-correct { background: rgba(46, 204, 113, 0.2) !important; transition: 0.2s; }
        .flash-wrong { background: rgba(231, 76, 60, 0.2) !important; transition: 0.2s; }
    </style>
</head>
<body id="game-body">

    <div id="midi-info">מחפש פסנתר MIDI...</div>

    <div class="main-display">
        <div id="msg">חבר את הפסנתר והתחל לנגן</div>

        <div class="staff-paper">
            <div id="staff-output"></div>
        </div>

        <div class="game-stats">
            <div class="stat-box">
                <div class="label">ניקוד</div>
                <div id="score" class="value">0</div>
            </div>
            <div class="stat-box">
                <div class="label">זמן נותר</div>
                <div id="timer-display" class="value">5</div>
            </div>
        </div>
    </div>

<script>
const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

let score = 0;
let currentNoteData = null;
let timeLeft = 5;
let timer;
let canPlay = true;

const notes = [
    { name: "F/2", midi: 41, hasAcc: false },
    { name: "F#/2", midi: 42, hasAcc: true },
    { name: "G/2", midi: 43, hasAcc: false },
    { name: "G#/2", midi: 44, hasAcc: true },
    { name: "A/2", midi: 45, hasAcc: false },
    { name: "A#/2", midi: 46, hasAcc: true },
    { name: "B/2", midi: 47, hasAcc: false },
    { name: "C/3", midi: 48, hasAcc: false },
    { name: "C#/3", midi: 49, hasAcc: true },
    { name: "D/3", midi: 50, hasAcc: false },
    { name: "D#/3", midi: 51, hasAcc: true },
    { name: "E/3", midi: 52, hasAcc: false },
    { name: "F/3", midi: 53, hasAcc: false }
];

function draw() {
    canPlay = true;
    const div = document.getElementById("staff-output");
    div.innerHTML = "";
    
    const renderer = new Renderer(div, Renderer.Backends.SVG);
    renderer.resize(400, 200);
    const context = renderer.getContext();
    
    const stave = new Stave(50, 40, 300);
    stave.addClef("bass").setContext(context).draw();

    currentNoteData = notes[Math.floor(Math.random() * notes.length)];

    const note = new StaveNote({ clef: "bass", keys: [currentNoteData.name], duration: "q" });
    if (currentNoteData.hasAcc) note.addModifier(new Accidental("#"));

    Formatter.FormatAndDraw(context, stave, [note]);
    startTimer();
}

function startTimer() {
    timeLeft = 5;
    document.getElementById('timer-display').innerText = timeLeft;
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-display').innerText = timeLeft;
        if (timeLeft <= 0) {
            handleResult(false, "נגמר הזמן!");
        }
    }, 1000);
}

function handleResult(isCorrect, message) {
    if (!canPlay) return;
    canPlay = false;
    clearInterval(timer);

    const body = document.getElementById('game-body');
    const msgEl = document.getElementById('msg');

    if (isCorrect) {
        score += 10;
        msgEl.innerText = "נכון! ✨";
        msgEl.style.color = "#2ecc71";
        body.classList.add('flash-correct');
    } else {
        score = 0;
        msgEl.innerText = message || "טעות!";
        msgEl.style.color = "#ff4757";
        body.classList.add('flash-wrong');
    }

    document.getElementById('score').innerText = score;

    setTimeout(() => {
        body.classList.remove('flash-correct', 'flash-wrong');
        draw();
    }, 800);
}

// לוגיקת MIDI
if (navigator.requestMIDIAccess) {
    navigator.requestMIDIAccess().then(access => {
        document.getElementById('midi-info').innerText = "פסנתר MIDI מחובר ✅";
        document.getElementById('midi-info').style.color = "#2ecc71";
        
        access.inputs.forEach(input => {
            input.onmidimessage = (m) => {
                const [cmd, note, vel] = m.data;
                // פקודה 144 זה Note On
                if (cmd === 144 && vel > 0) {
                    if (currentNoteData && note === currentNoteData.midi) {
                        handleResult(true);
                    } else {
                        handleResult(false, "תו לא נכון!");
                    }
                }
            };
        });
    });
}

// התחלה
window.onload = draw;
</script>
</body>
</html>
